  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0096_WYG_001-1a, image: WYG0587/WYG0587-0472a.png}
body:
  text: 長安志圖卷上目録漢三輔圖奉元城圖太華圖漢故長安城圖唐禁苑圖唐大明宫圖東內苑附唐宫城圖城市制度城南名勝古迹圖唐驪山宫圖上唐驪山宫圖中唐驪山宫圖下長安志圖卷上目録前漢京兆尹縣十二左馮翊縣二十四右扶風縣二十一後漢併省不同三輔漢初因秦舊名內史尋又分左右至太初已後遂更之皆治長安城中長吏各在其縣光武東都之後扶風出治槐里馮翊出治髙陵漢城惠帝時築後趙石虎亦嘗修之城在今奉元路西北十二里苻秦西魏宇文皆都之隋開皇三年遷都龍首川通鑑作龍首山此城遂廢至今民呼猶曰楊家城在唐𨽻禁苑置四監其中掌園囿種植之事故其宫室因漢舊而葺焉城制南為南斗形北為北斗形周六十五里十二城門八街九陌九市十一里計地九百七十三頃其街陌等名並載志書此不具録市制四靣皆市人居之中為二署蓋治市之官府也舊圖全畫坊市制度今圖小不能記容别畫一坊之制以見其餘宫城東西四里南北二里二百七十步周十三里一百八十步其崇三丈五尺掖庭宫廣一里隋開皇三年六月詔規建制度先築宫城次築皇城次築外郭城皇城亦曰子城東西五里一百一十五步南北三里一百四十一步南北七街東西五街其間並列臺省寺衛承天門外有東西大街南北廣三百步限隔二城也橫街之南有南北大街東西廣百步即朱雀門街自兩漢以後都城並有人家在宫闕之間隋文帝以為不便於事于是皇城之內惟列府寺不使雜居公私有辨風俗齊整實隋文之新意也外郭城東西一十八里一百一十五步南北一十五里一百七十五步周六十七里其崇一丈八尺唐外郭城東西南靣各一門直十一街橫十四街當皇城朱雀門曰朱雀街亦曰天門街南直明德門南北九里一百七十五步縱十二街各廣百步皇城之南橫街十各廣四十七步皇城左右各橫街四三街各廣六十步一街直安福延喜門廣百步夾城玄宗以隆慶坊為興慶宫附外郭為復道自大明宫潛通此宫及曲江芙蓉園又十宅皇子令中官押之於夾城起居在東外郭廡後宣宗於夾城南頭開便門自芙蓉園北入青龍寺俗號新開門杜牧之詩六龍南幸芙蓉苑十里飄香入夾城謂此坊市總一百一十區萬年長安以朱雀街為界街東五十四坊及東市萬年領之街西五十四坊及西市長安領之皇城之東盡東郭東西三坊皇城之西盡西郭東西三坊南北街一十四坊象一年并閏每坊皆開四門中有十字街四出趣門皇城之南東西四坊以象四時南北九坊取周禮王城九逵之制其九坊但開東西二門中有橫街而已蓋以在宫城正南不欲開北街泄氣以衝城闕碁布櫛比街衢繩直自古帝京未之比也城圖云皇城之南三十六坊各東西二門縱各三百五十步中十八坊各廣三百五十步外十八坊各廣四百五十步皇城左右共七十四坊各四門廣各六百五十步南六坊縱各五百五十步北六坊縱各四百步市居二坊之地方六百步靣各二門四靣街各廣百步渠水一曰龍首渠自城東南導滻至長樂坡釃為二渠一北流入苑一經通化門興慶宫由皇城入太極宫二曰永安渠導交水自大安坊西街入城北流入苑注渭三曰清明渠導坈水自大安坊東街入城由皇城入太極宫吕氏曰隋氏設都雖不能盡循先王之法畦分碁布閭巷皆中繩墨坊有墉墉有門逋亡姦偽無所容足而朝廷宫寺民居市區不復相參亦一代之精制也唐人蒙之以為治更數百年不能有改其功亦豈小哉隋文有國才二十二年其剗除不庭者非一國興利後世者非一事大趣皆以惠民為本躬決庶務未嘗逸豫雖古聖人夙興待旦殆無以過惜其不學無術故不能追三代之盛豫因考證長安故圖觀吕氏此言是圖之作其來尚矣愛其制度之密而勇于敢為且傷唐人媢疾史氏沒其實聊記于後元豐三年五月五日龍圖閣待制知永興軍府事汲郡吕大防題京兆府戶曹參軍劉景陽按視并州觀察推官吕大臨檢定鄜州觀察使石蒼舒書跋語此圖舊有碑刻在京兆府公署兵後失之有雷德元完顔椿者訪得碑本訂補復完命工鋟梓附於長安志後壬子年中秋日合口邳邦用跋新城唐天祐元年匡國節度使韓建築時朱全忠遷昭宗于洛毁長安宫室百司及民廬舍長安遂墟建遂去宫城又去外郭城重修子城即皇城也南閉朱雀門又閉延喜安福門北開玄武門是為新城即今奉元路府治也城之制內外二重四門門各三重今存者惟二重內重其址尚在東西又有小城二以為長安咸寧縣治所謹按長安京兆本朝奄有天下初為京兆府後為安西路至大四年改奉元路中統元年立十路宣撫司置治于此改路不知何年三年立陜西四川行省至元七年改行尚書省九年改設王相府十七年罷王相府復立行中書省一十三年四川分省成都專立陜西行省二十八年立行御史臺於雲南大德元年移置陜西奉元驪山溫泉自秦漢周隋相繼崇飾唐貞觀中始營御湯天寶六載築羅城于湯所置百司公卿邸第治湯為池增起臺殿環列山谷因改宫為華清宫明皇歲幸焉殿曰九龍以待上浴曰飛霜以奉御寢曰長生以備齋祀其他樓觀殿閣不可勝紀祿山之亂天子遊幸益鮮唐末遂廢晉天福中改曰靈泉觀以賜道士元祐三年中秋日武功遊師雄景叔題石刻在臨潼臨潼縣治今居廢宫之北址斜陽樓新長安志載之在老母殿北或曰即望京樓也未知孰是長安志圖卷上

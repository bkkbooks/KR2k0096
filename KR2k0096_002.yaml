倍止出夫一名添給其水如此加倍則民雖少亦可擬往日人戸三分之二矣如有盜澆供地不實嚴行斷罰又舊例每夫一名計澆田夏田一頃三十畝秋田四十畝共一頃七十畝議得今地廣人稀若依舊例其水有餘中間不無廵水之徒令無夫之家買水澆溉今擬令人戸更不增添夫數每夫一名令澆二頃六十畝庶望革去買水之弊又人戸合澆田禾頃畝照依舊例驗工輪畨使水各斗下若有在前不出夫役使水之家今後無得使水濫澆官斗門子人等私賣與水者依例斷罸行水之序須自下而上晝夜相繼不以公田越次霖潦輟功舊例各斗分須要從下依時使水澆溉了畢方許閉斗隨時交割以上斗分無得違越時刻又使水屯戸與民挨次自下而上溉田又體知得用水之家多使驅丁看水至冬月澆田遇夜避寒貪睡使水空過至明却稱不曾澆溉遲違田時枉費水利合行嚴加斷罰又五縣行使各水斗口舊例自下而上挨排次序放澆却因地形高低不等累經洪水吹濯渠深地高在前官司權令打立截堰放澆今來體知得其餘斗分不畏公法屯利人戸將地不盡實報倚仗人衆接上築打私堰將下次利戸合便水直改豁恣意放澆直至夜深却将水直分豁下流已下利戸不曾隄備以致泛溢澆過不應地畝或還入河虛費水利議得除渠深地高必用倒堰斗口比及定奪以來權且依舊外至其餘斗分務要依例自下而上挨排次序照依元供地畝合澆水直放澆無得似前打立截堰縱意多澆違者斷罪按五縣之地本皆斥鹵與他郡絶異必須常溉禾稼乃茂如失疏灌雖甘澤數降終亦不成是以涇渠之利一日而不可廢也諸違官禁作姦弊者斷罰有差照得大司農司元定若有違犯水法多澆地畝每畝罰小麥一石至元二十年承奉宣慰司劄付犯水人戸有做夫之家亦有不做夫之家議得如係不做夫之家每畝罰小麥一石興工利户每畝五斗至元二十九年陜西漢中道肅政亷訪司講究得違犯水法不做夫之家每嵗減半罰小麥五斗興工利戸每畝二斗五升外據犯罪每畝笞七下罪止四十七下又按舊例凡攙越盜用渠岸修築不牢澆溉不應地土渠吏蔽匿不申及斫䕶岸樹木無故於三限行立者皆有罪罰設立屯田庚子年八月奉㫖以梁泰充宣差規措三白渠使據梁泰奏告京兆府有舊來三白渠兵革以來渠堰缺壊地土荒廢陜西人户雖有種蒔不得水利稅賦不敷軍馬用度如修成渠堰每畝可收一鍾准奏仰梁泰就帶元降御前金牌充宣差措三白渠使至元十一年初立河渠營田使司安置屯田二十八年改屯田總管府是年九月十五日奏過事内一件節文安西府延安府鳳翔府這三路在前交軍立屯來根脚裏這軍每不是額定的正軍有成都府忙併時分幾處簽來去年省官人每奏了這軍交依舊為民來若是這軍每散了呵屯田的勾當得濟的勾當悞了也者這軍每雖交做民呵只交這的每種田不交罷呵怎生麽道額森特穆爾等京兆省官人每奏將來那般者麽道聖㫖有來立屯田府的勾當裏三箇路裏合立三處營田司衙門休立營田司立一箇屯田總管府衙門委付著好人管著屯田的勾當中也者麽道奏呵那般者麽道有㫖了也欽此都省移咨欽依施行准此省府照得營田司巳經革罷即將元管戸牛地土額辦粮草巳未送納及應干不了事件交割外據六盤迤東彭原等處元係成都接應軍人改為民屯比及别行設官以來恐悞合辦粮草擬令元管屯田千戸時暫拘鈐管辦皇慶元年再内至元十一年創立屯田于各縣交參協濟下户内盡撥屯田至元二十一年奏過事内一件在前軍站一千戸放罷收係屯田設官四員達嚕噶齊一員總管一員二官銜内立帶兼河渠司事凡有文移止稱屯田總管府為水事則稱兼河渠司事副總管一員同知一員首領官三員經歴一員知事一員提控按牘一員吏譯人等一十五人通事一人譯史一人司吏四人奏差四人都監一人壕寨四人合干一百五十二人看水洪口囤堰水軍一十名看守探量三限口水直人夫四名看守探量彭城限水直人夫二名看守邢堰人夫一名分俵水直斗門子一百三十五名司屬五所終南渭南涇陽櫟陽四所各設令一員丞一員平涼一所本府注擬正副提領各一人屯四十八終南九屯懷教屯樂平屯忠力屯曲泉屯樂成屯利澤屯奉上屯欒村屯安化屯渭南一十六屯懷德屯懷仁屯豐濟屯善慶屯閏澤屯永便屯皂角穹屯亭利屯信陵屯嚴應屯雨金屯安陽屯安慶屯南永夀屯北永夀屯郃陽屯涇陽九屯豐閏屯里仁屯昭義屯富安屯永昌屯廣備屯仁受屯安信屯華原屯櫟陽九屯歸厚屯安仁屯安業屯豐樂屯萬全屯廣盈屯阜盈屯大有屯定陵屯平涼五屯白店屯董志屯南莊屯南市屯冉店屯右渭南所屯田半皆在渭南陸地終南所華屯全在近山盩厔等處涇陽所屯亦半在醴泉富平原鄜州直羅等處櫟陽所屯除定陵屯在富平外八屯皆用涇水石川澆溉戸四千八百九十二地五千六百六十四頃一十二畝六分三釐八毫内荒閒地一千六百八十七頃九十七畝三分七釐八毫農器二千二百三十三副八分五釐牛二千一百零九具一隻九分每牛一具以二十分為率撥地二頃納粟麥五十石内大麥二十石小麥二十石粟一十石草一百束牛一隻者地數以下皆減半牛三隻以上各隨其分數以增之糧至大元年舊數九萬三千六百七十九石二斗九升一合六勺草三十一萬三千七百九十束四萬五千九百二十秤至正二年實辦糧數除倚免事故逃亡等戸外七萬二千六百五十九石七斗八升二合三勺四杪大麥二萬二千七百二十五石二斗零四合小麥二萬六千六百八十二石五斗一升八合七勺四杪粟一萬七千二百九十七石四斗八合白米八百一十四石五斗二升四合穈子一百五十五石零四升五合九勺粳米五十石八斗八升二合糯米九百三十四石一斗九升九合七勺草束二十九萬一千五百一十三束秤四千九百三十九秤四斤二兩建言利病承務郎陜西諸道行御史臺監察御史宋秉亮言洪口之利始於秦水工鄭國於仲山之下鑿引涇水首起瓠口尾注于洛溉田四萬餘頃至漢大始中水利廢壞趙中大夫白公因其故跡徙開渠口於上流首起谷口尾入石川以注于渭降及隋唐以至亡宋其利又廢大觀中又於小龍潭之上復開石土渠數里疏引自來之水入渠五尺賜名曰豐利渠迨今二百餘年其利漸少至大間監察御史王承德建言於豐利渠之北開鑿石渠長五十丈歲月已久吞水漸少入渠之水既微則築堰勞而民利寡矣嘗考古今渠利之廢葢因河身漸低渠口漸高水不能入是白公不容不繼於鄭渠豐利不得不開於白公之後也今豐利渠口去水又已漸高則王御史見開石渠又不盡功若不增治豈惟漸失民利慮恐日就湮塞近因廵歴至縣親詣新舊渠口一一相視遂採衆論酌以管見茍欲其利溥博其說有三一曰盡修渠堰之利二曰復置兩閘之防三曰開通出土之便然其要又在選委得人不當惜費今將貼說圖本具呈憲臺照詳施行一相視得鄭渠起于瓠口今駱駝彎西北是也上至白公渠口二千七百餘歩白公渠口即今小龍潭下是也上至宋豐利渠五十六歩豐利渠又上至王御史新開石渠五十六歩已上三堰西北高而東南低涇水自仲山出由高而下河岸去水漸高今量得鄭公渠口至水靣計高五十餘尺白公渠口至水靣計高一丈三尺相懸如此雖欲不改不可得也今豐利渠一水亦高七尺有餘方新渠未開之時每歲差民起立石囤堰水計用囤三百八十箇高一丈有餘費役甚廣而水益艱澁是以王御史乃於上流窄處疏鑿此渠止用囤一百八十箇宜其省費而水可通也然其底亦高河水三尺所立囤堰厚止三重河流深處囤之高者乃至一丈五尺浮坐於地每遇河水泛漲不禁衝突易於傾壞反不若宋渠之堰鑿石安立樁橛猶以為固也今涇水石底安樁石眼猶存是以用費益多民力益困詢諸衆言皆言新石渠起於山脚地勢高於接流其底既比元言猶有三尺未開宜與舊鑿渠底通行計料再令開鑿加深八尺如此不待囤堰之設先有五尺自然之水入渠其囤但比水高五六尺則渠受水之多不言可知宜計舊堰廣狹新囤高下即今三重之上截作九重囤堰既低且厚縱遇小漲只於囤上漫流而過不至衝激傾倒設使囤壞亦不妨自然入渠之水此法之外無以復加一相視得舊閘二所上下相去四十餘歩中間元用退水舊槽至今見存其置槽去處上離宋渠四百四十九歩離新開石渠五百五十原闕六字退水槽近上三十餘歩渠身兩壁開鑿砌口二道當時設此盖遇涇水暴漲及洪堰倒塌之時即下此閘以備濁水淤澱渠道平流一閘在退水槽近下十歩渠身兩壁亦有砌口四道盖於住罷澆田之後水既無用遂開此閘乃退渠水由槽還河又當河漲之時或淨浪不能猝下或巳下而漏漫濁水併下兩閘以防不虞此皆古人良法安可廢而不行近年以來渠湮岸崩民漸失利擬合將二閘修置以時開閉則濁泥不得入渠穿淘之工可以減半又淨浪相離新渠窵遠濁水入渠必至淤澱宜將此閘移于渠口近下一二十歩安置一相視得洪口以下石土渠十餘里自古穿淘兩岸積土如山舊時將所積高岸開為通道名曰鹿巷又穿淘泥沙由鹿巷運於岸外近年以來淘出泥土填滿鹿巷口於岸上堆積或遇霖雨其土崩塌復入於渠是以渠道益淺水來益小今觀渠與涇河相望咫尺運土入河甚不費力縁為累年堆積以至太多是以為難此皆有司因循姑息之過也起夫穿淘妨農病衆甚為可憐擬合於農務未忙天暖人閒之時差遣五縣人夫將鹿巷開至平地般運積土逺離渠岸或運入河以漸而去不得似前輒閉岸巷假以歲月積土漸除渠道自通人力既省官政亦簡民之受賜胡可勝言一漢之鄭白宋之豐利功大而利久者由其委任得人不惜財費故也今自王御史建言以來三十餘年而工尚未成者原其所自實由選委不當有所靳惜不能成爾今欲開鑿前渠復修兩閘監督之官宜當遴選工食之給不可吝惜自古及今為經久之計者不計重費成非常之功者惟在得人今詳此功勞費雖廣可以永逸擬合擇選諳曉水利練達時宜亷幹官員度宜優給以成久利之功如其不然將見五縣之民日趨窮苦屯田之置亦為虛設況今石渠已至仲山石脚更無開展去處若更不成是使二千年歴代養民之利一朝而廢豈不痛哉所以行省必合選官興治毋惜小費明立賞罰使有懲勸然後事可集而功可成也雲陽人楊景道嘗論涇水之善一則民苦渠堰之勞費獲灌溉之利一則限畝法弊論次不明致使小民動觸刑憲即欲上言未果頗采其說以附于左其畧曰至元九年至十一年二次准大司農劄付勸農官韓大使耀用宋大守等官公同講究使水法度呈准中書省以為定例雖其節目若有未詳然其大綱固已條舉其後改立官府至元之法漸以廢弛水法壞亂多寡不均加以囤堰薄疎渠道淺狹水利微少夫役繁重刑罰相繼使涇水之利反為河北之害今畧舉三以明其弊一至元續議提令人戸依上年額定實數更不增添每夫令澆夏秋田二頃七十畝庶望革去賣水之弊切詳所議寛限之法如此明白不見遵依今欲舉行宜將二頃七十畝之數停分三次兩月一週每次放澆八十七畝不限名色自今歲十月為始至來年五月計八箇月若其渠堰如法水流不斷可以澆溉四次前二次己及元限後一次為澆秋苖如是渠水大小不一斷續相繼可復澆溉則逺近貧富均獲水利矣又水利云渠下可澆五縣之田九千餘頃以今屯利人夫一千八百名計之絶多補少每夫一名為田五頃舊例一名限澆一頃七十畝是十分之中盗澆者常有八分是以人皆犯法動觸刑憲故至元寛限作二頃六十畝則明澆者一半而不及者尚有一半其法雖未盡善而猶勝一頃七十畝之少今以渠水計之全水一百二十徼三分去一為八十徼一晝夜可澆田六十餘頃自今歲十月為始盡來年五月計一百四十日可澆一萬四千餘頃假使開啓渠堰便利致使水及百二十徼全數則一歲所澆又不止是今論者皆以即今水小為難殊不知今日水數亦不下八十徼矣全水一歲每夫可澆田六七頃今吏限作六十徼一夫猶當澆田五頃限以二頃六十畝豈能開至多乎若夫立限太寛倘遇天旱近水有力者任意多淫貧弱逺水者愈不得利故就二頃六十畝為限田雖多亦可周遍水大則必加倍況今既有兩限分澆法又有交承時日之則水小則拘限而能均水大則有時日民得盡利此誠得中不易之良法並行而不悖者也一各斗下利戸澆田既無先後排輪之次亦無各家合使日期惟以畝數為限或遇天旱民急目前之利違限多澆欲盡斷罰則傷百姓若不嚴禁復不能均人先開斗分多占月日及時澆溉全得其利近後斗分徃往過時失悞歲計一歲之中水來不過一二次水限畝數亦少合令每水頭一道斗口幾處驗各斗人夫多寡分定合開日時六十日内須要周遍仍令人戸供報花名地段頃畝見數置簿詳寫合該水程日期須要自下而上惟渠漲岸高者别為區處官及斗門子各收一簿永為定式憑驗使人知某日為某村之水某時為某家使水之期自然不敢侵越易避而難犯矣一限首眼同分水其法今亦廢弛故五縣水利不均盖洪堰計因人功而成理宜驗夫用水但地理近逺不等渠道懸昂不一分水之時斟酌增減期於均平可也如北限昂而中限懸當增北限而減中限涇陽近而櫟陽逺當益櫟陽而損涇陽仍將各渠實冇夫數各限應得之水隨水大小議為則例刻之巨石立于限首庶使官吏將來有所憑驗易於舉行又驗夫分水與合得水程徼數復如舊日分作二道輪畨澆溉庶可與其餘水頭一齊周遍民免盜水之罪矣又如白渠水小之時宜將限工并中限權行止住聼下縣先澆候水大之時將閘下水程并開二斗或三斗以補之故限口有誌水石古語云水到石人手限上開三斗水到石人腰限上不得澆即前人規模之大方也涇渠總論涇水出安定郡岍頭山西自平凉界來經邠州新平淳化二縣入乾州永壽縣界千有餘里皆在高地東至仲山谷口乃趨平壤是以于此可以疏鑿以溉五縣之地夫五縣當未鑿渠之前皆斥鹵磽确不可以稼自被浸濯遂為沃野至今千餘年民頼其利但渠初鑿之時渠與河平勢無齟齬歲月潄滌河低渠高遂不可用雖白公趙佺繼之於後終亦不能久者盖仲山洪口萬嶺環複兩崖劃斷致河流湧出勢如建瓴復阻石堰其怒愈甚土石承委不得不朒今其下有小龍潭其深不測是水激射而成也河既漸下渠岸自高所灌之田日復淤閉雖强壅遏竟無良策今新石渠已迫山足又高三四尺矣茍不可行千載之功誠為可惜抑嘗考夫涇之形勢人有生長其處耳目習熟猶或不知不知韓人鄭國一入敵境何遽識此而開萬世之利不亦神乎雖然利之所在害必從之今五縣之民歲八月治堰九月畢工揵石伐木掘泥懸土入水置囤下臨不測今涇渠兩岸累年淘出泥沙堆積增益高至三十五尺下窺渠面如視井底每年差五縣人夫入渠負龍撁曳而上依舊堆積及洪口安囤之處水深丈餘其底皆石水流湍急下入龍潭其深不測所置囤堰不時衝壞石木盡去杳無餘迹每年増葺人役水中至有溺者十月引水以嗣來嵗入秋始罷又復就役寒暑晝夜不得少休水法自十月放水至明年七月始罷晝夜寒暑風雨晦冥不敢暫輟須循環相繼然後乃遍嘗問其故以為或開疏壅水即不洩蓋土性本薄輕於瀆淖反成其癖正如病人一日離藥病即復來故人有地饞之說而墾闢耘斂播植之勞猶不與焉加以官府程督旁午畦陌條約限禁𤨏屑尤甚近年水脉艱澀所潤益寡紛爭訟䦧姦弊百出究其委曲胡可盡言于是民有上訴願弛其利以免劬瘁有司以故事舊規不敢輒許嘗聞諸水家民田近水而地下者便而多利逺水而地髙者難而寡利又為限畝所拘不得盡溉其田故逺者有願不用水以免其役者有司以修治役大近者不能獨當不敢許也嗚呼夫韓本欲疲秦人于一時不知後世病復甚邪由是言之為之奈何𫝊曰其人存則其政舉其人亡則其政息使西門史公倪内史白中大夫為之吾知其有不患者矣當今之時必欲繼疏鑿之功復古人之迹使千百世永永而無弊者世果無髙智絶倫卓犖竒偉如若人者哉長安志圖巻下

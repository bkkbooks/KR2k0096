body:
  text: 長安志圖巻中目録咸陽古跡圖唐昭陵圖唐建陵圖唐乾陵圖唐陵圖説圖志雜説一十八篇長安志圖巻中目録昭陵圖說諸陵附余觀自古帝王奢侈厚葬莫若秦皇漢武工徒至六十萬天下稅賦三分之一奉陵寢秦陵纔高五十丈茂陵十四丈而已固不若唐制之因山也昭陵之因九嵕乾陵之因梁山泰陵之因金粟堆中峯特起上摩煙霄岡阜環抱有龍蟠鳯翥之狀民力省而形勢雄何秦漢之足道哉昔貞觀十八年太宗語侍臣曰漢家先造山陵身復親見又省子孫經營煩費我深是之我看九嵕山孤聳迥絶實有終焉之志乃詔先為此制務從儉約九嵕山上足容一棺而已又慕漢之將相陪葬自今後功臣宻戚各賜塋地一所至二十三年八月畢工先𦵏文徳皇后長孫氏當時陪𦵏之盛與夫刻番酋之形琢六駿之像以旌武功列于北闕規模宏大莫若昭陵按陵今在醴泉縣北五十里唐陵園記云在縣東三十里盖指舊醴泉縣而言之也其封内周回一百二十里下宫去陵十八里今已廢毁陪𦵏諸臣碑刻十亡八九悲夫因語邑官命刋圖于太宗廟以廣其傳焉紹聖元年端午日武功游師雄景叔題陪𦵏諸臣一百六十五人諸王蜀王愔已下七人公主清河公主已下三十一人妃嬪越國太妃燕氏已下八人宰相李勣已下一十三人丞郎三品戸部尚書唐儉已下五十三人功臣大將軍尉遲敬德已下六十四人内蕃將阿史那忠等九人諸蕃君長貞觀中擒伏歸順者琢石肖形狀而刻其官名凡十四人突厥頡利可汗左衛大將軍阿史那咄苾突厥利可汗左衛大將軍阿史那什鉢苾突厥乙沴泥孰俟利苾可汗右武衛大將軍阿史那禰爾薛延陁真珠毗伽可汗吐蕃賛普新羅樂浪郡王金真德吐谷渾河源郡王烏地祓勒豆可汗慕容諾曷鉢龜兹王訶黎布失畢于闇信馬耆王龍突騎支高昌王右武衛將軍麴智勇林邑王范頭利婆羅門帝那伏帝國王阿那順所乗六駿刻石于北闕之下一曰青騅平竇建德時乗贊曰足輕電影神發天機䇿兹飛練定我戎衣二曰什伐赤平王世充竇建德時乗贊曰瀍澗未靜斧鉞伸威朱汗騁足青旌凱歸有中四箭處三曰特勒驃平宋金剛時乗贊曰應䇿騰空承聲半漢入險摧敵乗危濟難四曰颯露紫平東都時乗贊曰紫鷰超躍骨騰神駿氣讋三川威陵八陣五曰拳毛騧平劉黒闥時乗有石真容自拔箭處贊曰月精按轡天駟横行弧矢載戢氛埃廓清有中九箭處六曰白蹄烏平薛仁杲時乗贊曰倚天長劒追風駿足聳轡平隴回鞭定蜀肅宗建陵陪𦵏功臣尚父汾陽王郭子儀一人高宗乾陵在奉天縣宋元祐中計使游公圖而刻之防禦推官趙楷為之記曰乾陵之葬諸蕃之來助者何其衆也武后曽不知太宗之餘威遺烈乃欲張大誇示來世於是録其酋長六十一人各肖其形鑴之琬琰庶使後人皆可得而知之石人皆刻各人姓名歲久漫滅近得游公所刻四碑而亡其一每碑十六人各寫其衣冠形迹及其名爵其不知者闕之今鋟其可知及有闕字者凡三十九人于左徽左一碑左二碑十人故左威衛大將軍兼金都督僕固乞突領左威衛將軍闕都都督䑕闕施處毒勒德右軍將軍兼于泉督泥闕小阿悉吉度悉波威故左衛大將軍兼燕闕大都督葛塞匐故右衛將軍兼潔山都督突騎施傍靳武故右衛將軍兼頡闕都督拔蜜幹藍羡左衛將軍兼雙可闕舍提欲䕶斯故故左威衛大將軍兼延匐都督處木昆屈律䮕阿史那盎路故右金吾衛將軍兼俱闕都督關傍汗阿悉首那鞠大首領可汗頡利發大右一碑十三人故大可汗驃騎大將軍行左衛將軍崑陵都護阿史那彌則龜兹王白素稽故右驍衛大將軍兼龜兹都督故右武衛將軍兼闕龜兹闕白回地羅徵可疎勒王裴夷健蜜施吐康闕泥湼師師十姓汗阿史那斛瑟羅渾青斯駙馬都尉慕容諾曷鉢十右驍衛大將軍兼波都督波斯王卑路斯姓可汗阿史那元慶吐渾樂羯徒耶鉢右于闐王尉遲琡闕吐火闕子特勒達健二碑十六人石子石忽那故左武衛大將軍闕南十姓衛官大首領吐屯纈利發波斯大首領昧闕木俱罕闕斯陁勒咄吐威衛大將軍兼堅昆都督結黌蠶匐膚莫賀吐蕃使夫論悉曩然吐火羅葉護咄伽吾十姓大首領鹽䫹都都督阿史那忠節昆右金衛大將軍兼泃本督五姓㕼麪葉護職吐黙啜使移力貪开達于播仙城嗔河伏帝延兹蕃大酋長贊婆黙啜使葛暹達干龜大首領那利自阿力十碎葉州刺史安車鼻施闕狄仁傑以下六人畵像姓名今皆不存其見于奉天縣丞趙措繪像記者才二十九人焉措之記文多不盡載撮其大指畧曰唐之諸帝功烈如太宗明皇者可謂盛矣宜其立隴完固及于無髙窮今兵火之餘荒墟壞皿瓦礫僅存理亦宜也獨宗武后之陵崇丘磅礴上詣青㝠雙闕聳峙丹青猶在是豈造物者有以扶䕶而致然耶抑亦窮匱國力深規厚圖使人未易窺耶轉運游公一日按部過乾陵慨然興嘆乃録高宗天后時朝臣六十人重圖于陵所其間忠良骨鯁高才俊逸如張說蘇延碩狄仁傑婁師德劉仁軌唐休宋璟李嶠賀知章馬周李昭徳王綝張仁愿崔神慶李務光張柬之魏元忠陸元方李懐逺畢誠杜景佺皆一代善士固當紀者若夫武三思韋巨源崔湜武承嗣蘇味道封徳彞之輩回邪憸佞負國自謀而皆繪形于壁鑱記于石丹青可渝而善惡之迹不可變珉石可磨而勸戒之意不可冺則斯名也其與天地同于不朽哉措之記在元祐七年六月吉日唐之諸陵各有陪𦵏見于志者此不具録其諸帝之陵在乾陵之東者僖宗靖陵也在三原者高祖獻陵也敬宗莊陵也武宗端陵也在雲陽者德宗崇陵也宣宗真陵也在富平者中宗定陵也代宗元陵也順宗豐陵也文宗章陵也懿宗簡陵也在蒲城者睿宗橋陵也𤣥宗泰陵也憲宗景陵也穆宗光陵也圖志雜說龍首山古志曰山長六十里頭入渭水尾達樊川頭高二十丈尾漸下可六七丈又曰漢取山土為城山之餘尾在城西南數里乃盡今按城南鼎門之西南北附城有土嶺可二三百歩望之隱然如城俗名之曰土蛇嶺此即山之餘土也又漢臺殿城闕皆取山土為之是以高大數千年不圮西京賦曰疏龍首以抗殿是也山之餘尾城南皆已湮平坡陀互出復見于唐大安宫西東西横亙迤邐而去今大安宫城及内苑後墻含元殿臺一帶俱在山上下去平地可六七丈南望城市俯而視焉原自含元以東其地漸平不見垠堮一日登秦冢望之隱然而東直際滻水與白鹿諸原映帶南去又自長樂坡下其岡中斷道出其間其西廓然率多塹掘問之人云安西築邸時取其土也北斗城三輔舊事及周地圖記曰長安城南為南斗形北為北斗形今觀城形信然然漢志及班張二賦皆無此說予嘗以事理考之恐非有意為也盖長樂未央酇侯所作皆據岡阜之勢周二十餘里宫殿數十餘區惠帝始築都城酇侯已沒當時經營必須包二宫在内今南城及西兩方凸出正當二宫之地不得不曲屈以避之也其西二門以北渭水向西南而來其流北拒高原千古無改若取東城正方不惟太寛又當渭之中流人有至其北城者言其委曲迂廻之狀盖是順河之勢不盡類斗之形以是言之豈後人偶以近似而目之也與賦語文人之詞固多張誕然身未嘗至目未嘗覩亦未可輒拒而不信嘗讀漢人之賦遂覺西京臺觀之盛班孟堅曰軼雲雨於太半虹霓廻帶於棼楣又曰攀井幹而未半目眴轉而意迷張平子曰將乍往而未半怵悼慄而慫兢王子淵曰若播岸而臨坈登木杪以矙泉論者以為皆危險悚懼非王公所宜乗履誠為確論予至長安親見漢宫故址皆因高為基突兀峻峙崒然山出如未央神明井幹之基皆然望之使人神志不覺森悚使夫當時樓觀在上又當如何由是觀之則數公之言未可遽謂張大也昔蔡九峯不信鳥䑕同穴後人譏之予恐不知而論將使後人而復譏後人也小兒原駱氏志載新說唐皇子幼則居内漸長成于東内苑為大宅於外為十六王宅外又置百孫院王子王孫勿得出外鬭雞走狗蹴踘彈射于苑中龍首原俗號曰小兒原或曰今原東有西番浮圖至元中所建其下是一古塚經營之始塹之為基得一石槨有篆文三曰小兒塚意者原名以是然今亦不知有此名矣村名長安咸寧二縣民多以故宫殿門闕名其所居然訛謬不可盡記志稱下馬陵訛為蝦蟇陵秦夀陵訛為韓生塚建章宫訛為貞女樓翠華殿訛為祭酒臺不特是耳至以漢城為陽甲城霸城門為萬城門覆盎門為紅門西安門為黄門正武殿為講武殿城中又有白麥殿亦不知是何名然亦有傳襲舊名而圖志不載者如以宣平門為玉女門以其東有玉女山也以西門為金天門亦非野人之語若此之類又恐前代舊有是名耳有人嘗言于京師一朝官家見一雜書載陽甲城之說曰陽生于子而天方開甲始也漢有天下是為一代開天之始如陽始生以期福禄於未艾觀其宫名未央可見愚按此說似為有理然如其言則是陽甲之名漢已有之何故傳記皆無一言稱之且陽甲殷王漢固不當以古帝王之名目其城也宋次道長安志極為精博亦不見取但言隋遷都此城遂廢俗呼曰楊廣城此說是也盖煬帝弑父亡國民斥其名政猶時日曷喪云爾復何疑乎其後又轉而為楊家也漢瓦形製古妙工極精緻雖塵壤潰蝕殘缺漫漶破之如新人有得其瓦頭者皆作古篆盤屈隱起以為華藻其文有曰長樂未央有曰長生無極有曰漢并天下有曰儲胥未央有曰萬夀無疆有曰德合無疆亦有作上林字者昔人有于陳倉得秦瓦文曰羽陽千歲羽陽秦武王宫也以是知古人製作不茍雖一瓦甓必有銘識不特彛鼎為然耳又有得瓦作楚字者亦秦瓦也秦作六國宫室于咸陽北坂上意者必用其國號以别之與又未央字瓦凡離宫故基亦皆有之今杜陵碎瓦中皆有未央長樂等字亦不知其何故也古瓦陽靣多作小窩泥狀如雨㸃亦有作繩痕者予嘗過其鹿臺下見其敗瓦亦然乃知秦漢已前製皆作此但不知所以製之之意或曰盖仰用者以固泥也說亦有理又唐瓦有如漆者盖是碧瓦歲久而色變也漢瓦皆素獨故城中未央瓦表裏皆黑堅如鐵錫今不多得其所得者皆離宫瓦也由是言之雖其宫室壯麗猶見近古尚質也與長楊關中人家園圃池沼多植白楊今景龍池尤多皆大合抱長數丈葉厚多風恒如有雨因憶唐人詩朝元閣上西風急都入長楊作雨聲正謂此樹以見故宫悲涼之意也說者以長楊為漢宫今宫在盩厔去驪山百餘里殊無相渉且漢以木名宫如桂宫棠梨豫章五柞者非一又安知長楊不以是木名耶樊川本樊噲食邑故名人云今其墓在神禾南原上長安名勝之地周處士韋夐唐杜公牧之祁國杜公竒章牛公之居皆在焉唐人語曰城南韋杜去天尺五可見昔時之盛今雖殘廢之餘而終南之神秀原陸之澶漫源泉之灌注草木之葱蒨近蜀之饒固自若也然古人勝遊之迹見于文章篇什者歴歴可考變遷以來盖有名存而實亡有有其處而名不可知者前輩有張茂中同其友為城南之遊嘗作記以紀之當時遺跡猶有存者今欲訪之尚能見其彷彿據可知者别為一圖掇其遺漏以補其闕曰杏園者唐新進士宴遊之所在曲江鴈塔之南今皆耕為民田曰韓莊者在韋曲之東退之與孟郊賦詩又送其子讀書之所也鄭莊又在其東南鄭十八䖍之居也曰塔坡者以其浮圖故名在韋曲西何將軍之山林也今其地出美稻土人謂之塔坡米蓮花洞在神禾原即鄭駙馬之居所謂主家隂洞者也翠微寺在終南山又有牛頭寺坡所謂青山意不盡袞袞上牛頭者也李抱玉碑在杜水村有墳栁宗元碑昌黎之文在少陵原之北人云陵西有子美故宅蕭灌墓在焦村吐蕃論弓仁墓在趙村渾瑊墓亦在城之西南餘皆不能備載噫高岸為谷深谷為陵而況區區之宅第丘壠哉特以古人之名所仰止不欲遺之故耳樊川今有華嚴寺但謂之華嚴川云其東十里許有興教寺在原半全望南山最為名勝杜陵今在奉元城東南二十五里三趙村陵在高原之上即所謂鴻固原也陵之制正方詢之居人每方百二十歩據地六十畝四靣去陵十餘歩皆有觀闕基趾其東南數十歩又有一陵形制差小皇后王氏之陵也按漢史宣帝后許氏早崩葬杜陵南園去杜陵十八里今在司馬村少陵原上俗呼曰司馬塚豈以后葬博陵所葬遂誤稱耶又霍后廢立王媫妤為后後為太皇太后年七十餘成帝時崩合𦵏杜陵村東園其陪葬之塚稍大者恐是淮陽憲王等母三媫妤之塜其小者或貴人以下塚也何以言之若羣臣附葬必不在後宫之列以是知之其東陪葬數十塚環拱森列大小不等其北里許亂塚百餘自是以北直至城南東西延亙高原之上纍纍皆是但不知其名耳前代陵塚大明宫城北十里許唐禁苑也近漢城之東有大陵十餘制度雄偉年代久逺必古帝王陵也其西南亂塚尤多以予觀之蓋是秦陵何則唐之禁苑非營𦵏之所苻姚西魏世代不逺干戈相仍恐無此承平之制設謂當時帝王之陵亦不當如此之近且西魏孝武陵在渭南文帝及後周文帝陵皆在富平隋文陵在武功煬帝陵在畢原宇文陵在好畤苻健嘆石安原而有終焉之志周漢諸陵皆不在此獨秦陵不見今樗里子墓在漢城中莊襄陵在今城東始皇扶蘇陵又在臨潼正與此陵俱是一帶予固以為秦陵無疑也其餘叢塚駱天驤所載韓信塚在霸城東三十里新店則夫漢及苻姚以降諸臣或亦有之不可知也大抵古人陵塚圖志雖載其處然亦不敢必其所指是亦知之之一道也華州亂石華州東有亂石十餘里蔽野横路馬閡幾不可行其大者皆如岡阜而不成山問之人云少華山崩也遂考諸宋史熙寧五年九月知華州吕大防言少華山前阜頭谷山嶺摧陷其下平地東西五里南北十里潰散墳裂涌起堆阜各高數丈陷居民六社凡數百處林木廬舍亦無存者華山之民言數年以來谷上常有雲氣每遇風雨即隱隱有聲是夜初昏畧無風雨山上忽霧起有聲漸大地遂震動食頃即有此變金翰林應奉蘭泉張建有石字坡賦序云坡在華州之東宋熙寧間阜頭神所移也皇統已已春道過其間觀而賦之今其地有阜頭神廟壁畫風雷山移之狀因閱前史漢獻帝初平四年華山崩裂世逺不可推究唐武后垂拱二年新豐有山湧出初六七尺漸高至三百尺名曰慶山今在臨潼東南三十五里與此事皆在人耳目者遂表出之嗚呼大化旋移振蕩廻薄神變翕忽何怪不有夫以漢之獻帝唐之武后宋之神宗而皆有此希聞之大異則其為國亦可知矣火餘碑唐碑為巢寇所燬而尚存者三其一華山碑在西嶽廟剥裂之餘巉巖削刻勢轉奇特初不類為碑也卓立而不仆者數百年矣其一華萼樓碑在景龍池南其一右軍碑在城西北嗚呼碑之壊以屋累也其意本欲傳逺區區以屋覆之其為計也淺矣試官石在九耀街武安王廟前横卧街側色黑而瑩長四五尺高二三尺世傳唐時舉人就試以釘釘之卜其中否今觀石上有釘數十餘釘頭皆露亦有半入而上曲者昔李將軍射石飲羽盖偶然耳此豈偶然者耶其理殆不可曉關中碑刻自石鼓而下秦漢以來所在甚多而唐碑尤盛兵火之餘殘毁無幾或為野人賣為寺觀墳墓之物風紀亦嘗禁之然終不能禁也今文廟有趙明誠金石目録三十卷而多不載所在或云又有田氏京兆金石録亦不復見唯儒士駱天驤嘗録石垂刻一編附其所著類志後自言跋履荆莽尋訪抄録六十年然皇甫誕碑今在鳴犢鎮亦率更所書字畫尤偉而不及載則所遺者多矣余嘗命魯齋書院刋補駱志闕失因增續得碑刻於後而未暇也後之博雅君子得無有志乎云爾圖制有宋吕公大防所訂志中時亦引用觀其布置大段皆是然其宫室臺榭門闕委曲之詳理固不能盡也近因刻梓復加比較見其與志微有不合或與故跡顯然相戾者畧載一二唐大安宫高祖所以處秦王也志曰在宫城之西今乃在其西北壊堞宛然今人猶曰秦王府圖本所載是也宫城西偏附城有小城垣即掖庭宫也今見其處止可容置一宫而圖乃以大倉雜處其中大非所宜又志亦不曽載若此之類必是碑本磨滅後人不詳誤附之者又漢城中有石人石馬定心石之類今皆去之掖庭東北垣上有一方臺不知何基考之于志恐所謂宫人教藝之所名衆藝臺者也注云舊圖有之遺跡尚存今圖本却無不敢附入其顯然相戾者内苑北偏半在龍首岡上今其東乃是城墉兩頭有二角樓基跡皆高數丈其南却是平地全無係著其北樓基西有小墻基折而西去即内苑之北墻也其墻約二里許直一大基方廣數丈墻亦自此而絶其基正當大安宫之東北以志考之當是翠華殿基所謂祭酒臺者是也不然是亦樓基其西南樓基歲久湮平遂使後人疑也今圖乃以禁苑之毬塲悞置在此其上項所存城墉樓基與畫本宫殿全不相合然竟不曉當時之制果如何也因記于此欲使觀者必參志而求之方見古人全盛之制水磨賦浮休居士之所作也華州廳壁有石刻不著姓名或曰宋張舜民字芸叟號浮休居士未詳是否序曰浮休既投迹少陵一日有以水磨求售者相其地乃古之宜春苑也今謂之韋曲自漢唐己來諸韋居之與後周逍遥公曬書臺唐杜岐公韓退之舊業鄭都官之園池隣里籬落垠堮皆在人云李太白嘗居此地仰終南之雲物俯滴水之清湍喬林隱天修竹蔽日真天下之奇處關中之絶景也暇日聊為之賦云粤自大樸既散機事滋熾抱甕無譏斵輪改制脫大車之左轂障横流之肆置圭測深淺審度靣勢覆厦屋之沈沈釃長溪之沸沸徒觀夫老稚咸集麥禾山積碓臼相直齒牙相切碾磨更易晝夜不息洶洶浩浩砰砰礚礚鼓浪揚浮交相觸擊飛屑起濤雪翻氷析仰而觀之何天輪之右旋覆轑膠戾蟻行分寸遲速間隔俯而察之何地軸之左行消息斡連搘撑挺拔千匝萬轉而不差忒逆而視之脩渠繩直高岸壁立沄沄漾漾滉滉瀁瀁如坻之平如練之明忽然走下若衆壑之赴禹門也順而索之盈科後進遇險斯止瀲瀲灔灔成文布理汪澄淵黙乃見柔徳力盡而休功成而退若君子之善出處也彼華山三峯之飛瀑吕梁百歩之噴沫獨有賞心之玩曾無利物之實未若斯磨也不踰尋丈之間不匱一夫之力曾無崇朝之久而可給千人之食如是則驢馬不用麥城任堅農夫力穡知者圖焉故君子役其智小人享其利真為一鄉之賴豈止一家之事賈生曰水激則悍矢激則逺萬物回薄震盪相轉孔子觀於川流莊生監于止水因事㑹理是謂道紀況夫雍為九州之沃壤潏乃八水之上游樊杜引其吭豐鎬匯其尾夀山禦其表崇岡固其裏空淡鳥沒木老天深凭高四顧騁望千里其地產則動植飛潛充物旨美無所不備天府取之而不竭陸海探之而無底其人物則有漢唐已來韋杜二氏軒冕相望園池櫛比逍遥公築臺而曬書杜君卿鑿山而引水韓退之之西鄰鄭都官之北鄙參以太白忘機脫屣雖時代之屢遷顧風流之未弭末有一叟扶杖來止非夷非惠不農不仕或釣或弋翺翔徙倚鶴髪鮐背頽然而已矣補遺晉愍帝建興元年劉曜攻長安入外城焚龍尾及諸營還屯逍遥園四年曜攻䧟長安外城晉麯允退守小城今按故城止有大城二重長安志亦不云有小城惟載帝王世紀曰漢初置長安城本狹小惠帝更築廣大以是而推恐初置者為小城惠帝所築乃是外城即今故城是也但歴代變遷其迹不存耳不然豈有王者之都無外郭耶又長安城門名多重補愚恐亦有内城門名後世不詳併指為一城也何以知之志書宣平門注曰王莽改曰春王門民曰東城門其外郭曰東都門西京賦亦曰經城洫營郭郛是其一證歟又所引漢舊儀及郡國志說漢城里數處必有悞字龍尾營退之詩亦曰終南曉望踏龍尾注曰龍尾坡長安地名今按龍首山頭入渭水其尾則與杜陵諸原相去不逺矣逍遥園志載其名見於姚秦西魏時以晉史言前世已有是園但不言其處駱天驤謂今圭峯草堂是也予以還字推之恐當在滻水之東有又志書記都長安者西漢及晉苻姚魏周隋唐皆宫闕然劉曜亦都十年史稱曜作酆明等宫及夀陵周四里後依霸陵制度志則不書今雖不知其處覽古者亦當知之晉愍帝時盜發漢霸杜二陵及薄太后陵得金帛甚多按漢史文帝治霸陵皆瓦器不得以金銀銅錫為飾其儉至矣然猶不免為盜所禍夫茍有封樹之迹者豈信其儉而無物哉且所謂得金帛多者豈景帝不能盡遵文帝之訓或杜薄二陵所有不可知也知唐之諸陵亦皆遇盜惟乾陵獨完豈偶深秘盜不之今其西北有大溝人謂之黄巢溝其發掘處也俗又云乾陵之上人有游戯慢侮及取其瓦石者輙有靈響或别有他咎徃有驗者夫武氏之威震赫一時百世之下尚能驚動禍福人耶余既為秦陵辯矣因閱史記具列秦先君葬所其所名地有可知者有不可知者大概不出秦雍之域也其可知者圖志亦不盡載其不可知者今所在無名之塚又安知非是耶今叙史記所載以補志之闕且見余言之不妄云襄公文公葬西垂秦始立國在岐之西今隴西之西縣寧公出子葬衙馮翊有衙縣記曰寧公徙居平陽葬西山注曰郿之平陽武公𦵏宣陽聚東南紀云𦵏雍平陽初以人從死死者六十六人徳公宣公成公𦵏陽繆公𦵏雍皇覽曰塚在槖宫祈年觀下從死者百七十七人康公𦵏竘社共公𦵏康公南桓公𦵏義丘里北景公𦵏丘里南一作僖公畢公𦵏車里北即哀公夷公𦵏左宫惠公𦵏車里一云蘭公予𦵏陵園悼公𦵏僖公西城雍龔公𦵏入里一作人里愚按里者二十五家之名今樗里正在長安城中凡以里名者恐亦有相近者躁公葬悼公南懷公𦵏櫟圉氏靈公𦵏悼公西簡公𦵏僖公西出公𦵏雍獻公𦵏囂圉孝公𦵏弟圉惠文王始都咸陽𦵏公陵悼武王𦵏永陵皇覽曰秦武王塜在扶風安陵西北畢陌大塚是也人以為周文王塜非也周文王塜在杜中秦今按咸陽圖畢有周文王塚以是考之則是武王塚矣昭襄王𦵏茝陽今霸陵也自酈以西皆茝陽紀又云宣太后𦵏茝陽酈山孝文王𦵏夀陵莊襄王𦵏茝陽今東門外呼韓生塚者是也始皇𦵏酈邑扶蘇塚亦在焉二世𦵏宜春紀曰以黔首𦵏二世杜南宜春苑中秦瓦御史宋宜之嘗于阿房故基得一古瓦長二尺許高廣六七寸正方漸殺如斧形宛然若屋狀堅厚如白石隱隱遍作繩痕其相接處亦有笋距如今瓦但朴素耳長安古跡此類甚多但不得盡見也長安志圖巻中欽定四庫全書長安志圖巻下目録涇渠總圖富平石川溉田圖涇渠圖説渠堰因革洪堰制度用水則例設立屯田建言利病總論長安志圖巻下目録涇渠圖說渠堰因革一曰鄭國渠按漢志韓苦秦欲罷音疲之無令東伐乃使水工鄭國說秦鑿涇水自仲山西邸瓠口並傍去北山東注洛三百餘里洛今漆沮水也欲以溉田中作而覺秦欲殺之國曰臣為韓延數年之命而為秦建萬世之利也卒使就渠渠成而注填閼之水填音澱閼於去聲說文曰澱濁泥溉舄鹵之地四萬餘頃舄音昔鹵音魯鹹鹵之地也收皆畆一鍾二曰六輔渠漢孝武元鼎六年倪寛為左内史奏請鑿六輔渠以益溉鄭傍高卬仰同之田師古曰在鄭國渠之裏又曰仰謂上向素不得鄭國之灌溉者也水經曰此則於鄭國上派南岸更闢六道小渠以輔助溉灌耳雲陽三原兩縣界渠迹尚存亦曰輔渠今北限渠所經盖其地也但謂南岸者可疑恐當作北岸又兩縣北境清冶二水溉其高田即輔渠之遺制也三曰白公渠太始二年趙中大夫白公復奏穿渠引涇水首起谷口尾入櫟陽注渭袤二百里溉田四千五百頃民歌之曰田于何所池陽谷口鄭國在前白渠起後舉鍤為雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口按谷口即今洪口也涇水自其中出在瓠口之上白公非别為一渠也但以鄭渠勢高涇塞不行更於上流别鑿一口下流則就鄭渠之故迹耳今白渠口上去谷口五里又按鄭渠尾入于洛白渠尾注于渭注渭者由石川河入渭也宋豐利碑云考鄭國渠東注洛今石川河之東今渠抵石川而注乎渭石川今益深識者方引二渠跨之則四萬頃之饒不足多也今按沮水一源分為流本出延安中部宜君二縣西子午嶺其山脊以東之水經鄜州澄城同州朝邑以逹于河亦曰洛水其山脊以西之水經寧州襄洛縣入邠州界至耀州華原南與漆水合至富平縣東南入渭其名亦曰石川河意者古昔此河渠岸尚淺必堰此水與涇水合澆以東之地是以有四萬頃之多故曰鄭渠東入洛也後來此河渠漸深涇水不能過故白渠止入九河以注乎渭但溉數千頃而己宋碑之說盖欲引涇水跨越此河以益溉田之數然其實不能行也四曰豐利渠宋大觀中詔開石渠䟽涇水入渠者五尺下與白渠會溉七邑田三萬五千九十餘頃豐利渠口又在白渠之口所謂洪堰者是也今有宋資政殿學士侯䝉撰碑具存其文畧曰大觀元年閏十月主客員外郎穆京奉使陜西既復命以白渠歲罷民堰水起十月盡次年四月其間水囓堰與隄防圮壞溉田之利名存而實廢者十居八九得獻說者宣德郎范鎬鄜州觀察推官穆卞以謂熙寧間嘗命殿中丞侯可自仲山旁鑿石渠引涇水東南與小鄭泉㑹下流合白渠鳩工自熙寧七年秋至次年春渠之已鑿者十之三當時以歲歉弛役今其蹟可考案舊蹟而道建瓴之勢因民心而興萬世之利易若反掌乃詔本路提舉常平使者趙佺與獻說者相地計工二年七月詔可俾佺董其事經始以是年九月越明年四月土渠成下廣一丈有八尺上廣五丈深視地形之高下袤四千一百二十丈南與故渠合計工六十一萬七百有奇越明年閏八月石渠成下廣一丈有二尺上廣一丈有四尺深視地形之高下袤三千一百四十有一尺南與土渠接又度渠之北視其勢高峻留石僅三丈裁通竇以防漲水計工四十九萬八百有奇九月甲寅疏涇水入渠者五尺汪洋湍駛不舍晝夜稚耋驩呼所未嘗見凡溉涇陽醴泉高陵櫟陽雲陽三原富平七邑之田總三萬五千九十有三頃異時白渠所溉不過二千七百餘頃歲以八月屬民治堰土木一取于民費以億計夾渠之民終歲閔閔然望水之至不可得而輸賦如平時民以是重困是役也費不煩民因民之利工垂成臣穆京適帥秦鳯上遣京視役且撫問官屬給賜工師緡錢逺方知上之德意明見萬里鼓舞趨役不日而成鑿山堙塹民不告勞既奏工上嘉之詔賜名曰豐利渠開修洪口石渠題名記石多闕字節畧其文永興軍耀州六縣民田舊資白渠灌溉之利歴時已久涇流寖低渠勢高卬不能取水廼歲八月六縣令率夫數千集良材起巨堰堰水入渠至明年四月去堰所溉田則二千頃然堰成輙壞或數月壞故興修之功要為文具而民無實利大觀元年今秦鳯路經畧使穆公侍郎京以太府少卿出使陜西宣德郎范鎬承直郎穆卞因言開修洪口石渠之利穆公具聞于朝提舉永興軍等路常平等事趙公佺被旨相視具陳可成之䇿朝廷從之遂命趙公總按渠事初議鑿石與涇水適平然後立堰以取水趙公謂立堰當為逺計廼使渠深下水靣五尺則無修堰之弊而利溥且久既終功凡石土渠共七千一百一十九尺石渠北自涇水上流鑿山尾南與土渠接初料一千四百二十五尺其後土石接處發土見石廼展一千七百一十六尺通計三千一百四十一尺上廣十有四尺下廣十有二尺淺深隨山勢其最深者三十八尺分𨽻六縣㑹工四十六萬二千九百一十三料工之始視石之堅柔定以尺寸為工其下石頑攻不中程乃増工二萬七千九百五十三凡石渠之工總四十九萬八百六十六二年九月工興四年九月畢土渠北自石渠口東南與故渠接初計六千四百五十九尺而所展石渠既已省一千七百一十六尺其後接故渠處土雜沙石隨治隨壞度不可持久廼即其右開横渠二百尺與故渠合地脉堅實功簡而徑又省舊所治渠九百六十五尺實計土渠三千九百七十八尺上廣五十尺下廣十有八尺淺深隨地形其最深者七十五尺分𨽻六縣會工二十一萬一千八百一十六内涇陽三原高陵所𨽻有石棚隱土下厚或一丈或七尺八尺廼損土工一萬一千八百一十一而增椎鑿之工四萬七千九百七十九凡土渠之工總二十六萬七千九百八十四二年九月工興四年五月畢渠成惟石渠依涇之東岸不當水衝廼即渠口而工入水鑿二渠各開一丈南渠百尺北渠百五十尺使水勢順流而下又涇水漲溢不常廼即火燒嶺之北及嶺下因石為二洞曰廻瀾曰澄波限以七尺又其南為二閘曰靜浪曰平流限以六尺以節湍激渠之東岸有三溝曰大王溝小王溝又其南曰透槽溝夏雨則谿谷水集每與大石俱下壅遏渠水廼各即其處鑿地陷木為柱密布如櫺貫大木于其上横當溝之衝暑雨暴至則水注而下大石盡格透槽之口與石棚接如此已無患餘二溝則鑿渠兩岸比大木覆其上溝水入于涇石棚者石隱地中上下皆土不止一處其當溝口者水從下過空如棚狀今所謂暗橋者是也大王溝小王溝透槽溝三溝皆在古白渠之北宋豐利溝之東其溝皆從東來横衝渠身開渠之時將上二溝下流穿斷惟透槽溝至渠上適有石棚渠水流於棚下暴雨則水石從棚上過流入涇河惟此三溝水石皆落渠中故當時樹木為柵以拒大石而砂礫尚入渠内至前金時有主簿荆姓者始當一溝入渠之處構兩石橋于涇水上使與溝口相接其制橋上外高中低一如槽狀若遇溝水暴漲砂石皆從上過擗入涇河而渠方免石壅之患今人猶呼曰澄水槽又其東且十里曰樊坑當白渠之南岸其北直大溝溝水漲則岸壞與渠流俱潰壅之則渠不能容而下流為田患廼疊石為渠岸東西四十尺北高八尺上濶十有七尺其南石尾相銜而下四十尺溝水至則渠之所受滿其隄而止其上泄餘水以注坑中與涇合土石之工畢於是平導涇水深五尺下潟三白故渠增溉七縣之田一晝一夜所溉田六十頃周一歲可二萬頃大觀四年九月朝散大夫專管勾永興軍耀州三白渠公事都大提舉開修石渠飛騎尉蔡溥記至大元年承德郎陜西諸道行御史臺監察御史王琚建言于宋渠上更開石渠五十一丈元料渠長五十一丈濶一丈五尺深二丈計積一十五萬三千工每方一尺為一工已開一十四萬三千五百四十六工五分未開九千四百五十三工延祐元年興役後至元五年渠成延祐元年至三年先開一十二萬三千一百七十九工四分至元二年再開四千四百零二工一分五年再開一萬五千九百六十五工是年秋故堰至新渠口堰水入渠王琚字神瑗濟南鄒平人建言未行去職後再使督之諸渠于至元十一年九月初二日准奉大司農司劄付呈准中書省劄付先後講究定條畫使水法度内一欵節文後凡文案倣此皆低行大字書之自古以來青冶濁谷石川金定薄臺等水并耀州三原富平邠州管下淳化縣行流河水俱係灌溉田禾於民久利之事並令河渠司官管屬聼授節制每渠設渠直渠長一名依涇水例請給申報水直按長安志涇陽高陵櫟陽雲陽三原富平醴泉七縣皆涇水所溉之地今惟涇陽高陵全被涇水之利其雲陽北境高卬涇水不及今引冶七谷水自西北淳化界來分為渠以溉近山之地三原北境高卬涇水不及今引濁谷水自之西北華原界来分為六渠以溉近山地富平舊時南境北引白渠澆溉脾陽大澤豐潤三鄉今皆撥屬三原櫟陽餘地即引石川金定之水以溉其名是於志曰薄臺川東南入漆沮河溉民田堰武渠溉民田八里白馬渠溉田十五里長澤渠溉田十五里石泉渠溉田一十里永濟渠溉田十二里文昌渠溉田十里髙望渠溉田三里陽渠溉田十五里直城渠溉田二十里醴泉本漢谷口縣治所在涇水西其東北境則入雲陽涇陽至今猶有不毛之田在涇水東以其灌溉夫役不及宋修石渠六縣夫亦無醴泉意亦此歟櫟陽除涇水所溉之外其東北境頗高涇不能及遂引石川水逕斷原東梁村過白渠西南以溉其地武功唐咸通中京兆秦修六門堰以韋川莫谷香谷武安四水溉武功興平咸陽高陵等田一萬餘頃今廢又有昇原渠普濟渠皆溉民田今廢長安咸寧二縣亦有可溉之水往往廢涸不能詳記今知其一咸寧縣有龍首渠東南自滻水分出至城四十餘里以溉園圃之田其餘民自疏引以溉者又多官府不治也同按志所載與今異者恐或各有廢置是以不洪堰制度本朝因前代故迹初修洪口石堰修洪口即谷口也前代已有是名方言云凡石阻河流為洪又蜀人謂水口今縣有射洪徐有吕梁二洪義與此同當河中流直抵兩岸立石囤以壅水囤行東西長八百五十尺每行一百零六箇計十一行濶八十五尺總用囤一千一百六十六箇照得洪口往日水擊西岸渠口在東勢直衝堰故常吹去今來復擊東岸自癸已年創立渠堰每年増修云云囤行廣密委是堅牢雖遇水漲止是衝破龍口或捲去堰上石頭或吹損囤口或衝透囤眼故每歲增修及淘石渠上下泥沙人功不輟又舊例水軍三十人看堰今議得令各縣差富實人夫二名五縣計一十名看堰若有微損即便補修近來修理物色石囤每箇用椽兩缺四十八條擗稷二條棗條六十擔石積長五百七十五尺髙一丈濶一尺白草一十擔椽每人一日採打二條為一工棗條每人一日採打一擔為一工石積每人一日搬運長五尺高一尺濶一尺為一工草每人一日採打五擔為一工編造每囤用夫六名一日編造一箇為六工填囤每囤用夫一十二名為一十二工缺囤眼每箇石積一百四十五尺高一尺濶一尺白草五擔填囤眼每箇夫三名為三工下囤脚索每囤用索二條各長三十尺每條麻半斤錐囤麻每箇用麻四兩其餘什物在外石渠下廣一丈二尺上廣一丈四尺土渠下廣一丈八尺上廣五尺深視地形之高下渠岸兩邊各空地一丈四尺舊例岸兩壁無得當攔巡水道徑後稱空地者放此按今見行渠身即宋之豐利渠也王御史新開石渠亦同但身不及矣耳其立囤處河身亦窄今只用囤二行數皆減於舊立三限閘以分水凡二所三限閘其北曰太白渠中曰中白渠南曰南白渠太白之下是為邢堰邢堰之上渠分為二北曰務高渠南曰平臯渠彭城閘渠分為四其北曰中白渠其南曰中南渠又其南曰高望渠又其南曰隅南渠中南之下其北分者曰析波渠其南分者曰昌連渠渠岸兩邊各空地八尺凡渠不能出水則改而通之照得三限彭城兩處盖五縣分水之要北限入三原櫟陽雲陽中限入高陵三原櫟陽南限入涇陽至分水時宜令各縣正官一員親詣限首眼同分用庶無偏私若守閘之官不應或妄起閘一寸即有數徼餘水透入别縣甚宜關防三限閘在今洪口下七十里彭城閘又在下二十里或曰平石者秦人音訛也今並稱之圖經云中白渠首承太白渠東入高陵界南白渠首承中白渠亦入高陵界長安志云白渠自涇陽縣界三限下中限為一渠流至縣界彭城以下分為四渠注曰唐寳厯元年令劉仁師請更水道渠成名曰劉公渠彭城堰今按涇渠水道斗門時多變易以故或與舊迹不同皆因歲久渠深岸髙水不能上凡其可通之處輙為一渠其名亦異今惟三
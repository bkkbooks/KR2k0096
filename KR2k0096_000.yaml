body:
  text: 長安志圖地理類七古蹟之屬提要臣等謹案長安志圖三巻元李好文撰好文字惟中東明人至治元年進士官至光祿大夫河南行省平章政事致仕給翰林學士承㫖一品祿終其身事蹟具元史本傳此書結銜稱陜西行臺御史考本傳稱好文至正元年自國子祭酒改陜西行臺治書侍御史尋遷河東道亷訪史又稱至正四年仍除陜西行臺治書侍御史六年始除侍講學士此書葢再任陜西時作也自序稱圖舊有碑刻元豐三年吕大防為之跋謂之長安故圖葢即陳振孫所稱長安圖記大防知永興軍時所訂者好文因其舊本芟除訛駁更為補訂又以漢之三輔及元奉元所屬者附入凡漢唐宫闕陵寢及渠涇沿革制度皆在焉總序圖二十有二其中渠涇圖説詳備明晰尤有禆於民事非但考古蹟資博聞也本傳載所著有端本堂經訓要義十一巻厯代帝王故事一百六篇又有大寶録大寳龜鑑二書而不及此圖元史疎漏此亦一端矣此本乃明西安府知府李經所鋟列於宋敏求長安志之首合為一編然好文是書本不因敏求而作强合為一世次紊越既乖編錄之體且圖與志兩不相應尤失古人著書之意今仍分為二書各著於録千頃堂書目載此編作長安圖記此本題曰長安志圖疑李經與長安志合刋改題此名然今未見好文原刻而千頃堂書目傳寫多訛不盡可據故今仍以長安志圖著錄而附載其異同於此備考核焉乾隆四十六年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀長安志圖原序關中天府之邑土居上游古稱天地奥區神臯周及漢唐都之子孫皆數百歲雖其積累深厚亦曰神器之大措之善也觀其創業垂綂規模宏廓分郊畫幾制作詳密城郭宫室之巨麗市井風俗之阜繁山川靈迹之雄偉奇譎史册所書稗官所記文人碩士之揄揚頌嘆習而誦之如談蓬壺閬苑鈞天帝居使人耳可得聞目不可得而覩也原闕十三字圖見示當時弗能盡曉茫然原闕五字之及來陜右由潼關而西至長安所過山川城邑或遇古跡必加詢訪嘗因暇日出至近甸望南山觀曲江北至故漢城臨渭水而歸數十里中舉目蕭然瓦礫蔽野荒基壊堞莫可得究稽諸地志徒見其名終亦不敢質其所處因求昔所見之圖久乃得之于是取志所載宫室池苑城郭市井曲折方向皆可指識瞭然千百世全盛之迹如身履而目接之圖舊有碑刻亦嘗鋟附長安志後今皆亡之有宋元豐三年龍圖待制吕公大防為之跋且謂之長安故圖則此圖前世固有之其時距唐世未逺宜其可據而足徴也然其中或有後人附益者往往不與志合因與同志較其訛駮更為補訂釐為七圖又以漢之三輔及今奉元所治古今沿革廢置不同名勝古跡不止乎是涇渠之利澤被千世是皆不可遺者悉附入之總為圖二十有二名之曰長安志圖明所以圖為志設也嗚呼廢興無常盛衰有數天理人事之所關焉城郭封域代因代革先王之疆理寓焉溝洫之利䟽溉之饒生民之衣食繫焉觀是圖也凡夫有志之士游意當世將適古今之宜流生民之澤不無有助豈特山林逃虛悠然遐想升高而賦者以資見聞而已哉至正二年秋九月朔中順大夫陜西諸道行御史臺治書侍御史東明李好文序
